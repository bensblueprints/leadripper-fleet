<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadRipper Fleet</title>
<style>
  :root {
    --bg: #0a0e14;
    --panel: #111821;
    --panel-2: #0f141c;
    --border: #1e2a38;
    --cyan: #00e5ff;
    --cyan-dim: #00b8cc;
    --text: #e6edf3;
    --muted: #7a8796;
    --green: #3ddc84;
    --amber: #ffb020;
    --red: #ff5c5c;
    --purple: #a78bfa;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: ui-monospace, 'JetBrains Mono', Menlo, monospace;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
  }
  header {
    padding: 12px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, #0e141c, #0a0e14);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { margin: 0; font-size: 16px; letter-spacing: 2px; color: var(--cyan); }
  header h1 span { color: var(--muted); font-weight: normal; }
  .token-input {
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text); padding: 6px 10px;
    font-family: inherit; font-size: 12px; border-radius: 4px; width: 280px;
  }
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); padding: 0 22px; background: var(--panel-2); }
  .tab {
    padding: 10px 18px; cursor: pointer; font-size: 11px; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase; border-bottom: 2px solid transparent;
  }
  .tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab:hover { color: var(--text); }

  main { padding: 22px; max-width: 1600px; margin: 0 auto; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; }
  .stat .label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .stat .value { font-size: 20px; color: var(--cyan); margin-top: 4px; font-weight: 600; }

  .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; align-items: start; }
  @media (max-width: 1100px) { .grid-2 { grid-template-columns: 1fr; } }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 20px; }
  .panel-header {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-header h2 { margin: 0; font-size: 12px; letter-spacing: 2px; color: var(--cyan); text-transform: uppercase; }
  .panel-body { padding: 14px; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { padding: 7px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: normal; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
  tr:hover td { background: rgba(0, 229, 255, 0.03); }

  .status {
    display: inline-block; padding: 2px 8px; border-radius: 3px;
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
  }
  .status.idle, .status.queued { background: rgba(122, 135, 150, 0.12); color: var(--muted); }
  .status.working, .status.running { background: rgba(0, 229, 255, 0.12); color: var(--cyan); }
  .status.offline { background: rgba(122, 135, 150, 0.12); color: var(--muted); }
  .status.paused { background: rgba(255, 176, 32, 0.12); color: var(--amber); }
  .status.done { background: rgba(61, 220, 132, 0.12); color: var(--green); }
  .status.failed { background: rgba(255, 92, 92, 0.12); color: var(--red); }
  .status.cancelled { background: rgba(122, 135, 150, 0.12); color: var(--muted); }

  button {
    background: transparent; border: 1px solid var(--border); color: var(--text);
    padding: 5px 10px; border-radius: 3px; cursor: pointer;
    font-family: inherit; font-size: 11px; transition: all 0.15s;
  }
  button:hover { border-color: var(--cyan); color: var(--cyan); }
  button.primary { background: var(--cyan); color: var(--bg); border-color: var(--cyan); }
  button.primary:hover { background: var(--cyan-dim); border-color: var(--cyan-dim); }
  button.danger { color: var(--red); border-color: rgba(255,92,92,0.3); }
  button.danger:hover { border-color: var(--red); }
  button.amber { color: var(--amber); border-color: rgba(255,176,32,0.3); }
  button.amber:hover { border-color: var(--amber); }
  button.green { color: var(--green); border-color: rgba(61,220,132,0.3); }
  button.green:hover { border-color: var(--green); }

  input, select, textarea {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 7px 10px; font-family: inherit; font-size: 12px; border-radius: 4px; width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--cyan); }
  label { display: block; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; margin-top: 10px; }
  label:first-child { margin-top: 0; }

  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot.offline { background: var(--muted); }
  .dot.working { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .bar { width: 60px; height: 4px; background: var(--border); border-radius: 2px; display: inline-block; vertical-align: middle; }
  .bar-fill { height: 100%; background: var(--cyan); border-radius: 2px; }

  .muted { color: var(--muted); }
  .unauth { padding: 40px; text-align: center; color: var(--muted); }

  /* Industry picker */
  .picker { position: relative; }
  .picker-dropdown {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 50;
    background: var(--panel); border: 1px solid var(--cyan); border-top: none;
    max-height: 280px; overflow-y: auto; border-radius: 0 0 4px 4px;
  }
  .picker-dropdown[hidden] { display: none; }
  .picker-item {
    padding: 7px 10px; cursor: pointer; font-size: 12px;
    border-bottom: 1px solid var(--border);
  }
  .picker-item:hover, .picker-item.active { background: rgba(0, 229, 255, 0.08); color: var(--cyan); }
  .picker-item .gcid { color: var(--muted); font-size: 10px; margin-left: 6px; }
  .picker-item mark { background: rgba(0, 229, 255, 0.25); color: var(--cyan); padding: 0; }

  .preset-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .preset-row button { font-size: 10px; padding: 4px 8px; }
  .small { font-size: 10px; color: var(--muted); margin-top: 4px; }

  .lead-row td { font-size: 11px; }
  .copy-icon { cursor: pointer; color: var(--muted); margin-left: 4px; font-size: 10px; }
  .copy-icon:hover { color: var(--cyan); }

  /* Log modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 200; display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--panel); border: 1px solid var(--cyan);
    border-radius: 6px; width: 90%; max-width: 1000px; height: 80vh;
    display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0,229,255,0.2);
  }
  .modal-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-header h2 { margin: 0; font-size: 13px; letter-spacing: 2px; color: var(--cyan); }
  .modal-body {
    flex: 1; overflow-y: auto; padding: 14px 16px;
    font-family: ui-monospace, Menlo, monospace; font-size: 12px; line-height: 1.5;
    background: #060a0f;
  }
  .log-line { padding: 2px 0; white-space: pre-wrap; word-break: break-all; }
  .log-line .ts { color: var(--muted); margin-right: 10px; font-size: 10px; }
  .log-line .job { color: var(--purple); margin-right: 8px; font-size: 10px; }
  .log-line.error { color: var(--red); }
  .log-line.warn { color: var(--amber); }
</style>
</head>
<body>
<header>
  <h1>LEADRIPPER <span>// FLEET CONTROL</span></h1>
  <input type="password" class="token-input" id="admin-token" placeholder="Admin token" />
</header>

<div class="tabs">
  <div class="tab active" data-view="fleet" onclick="showView('fleet')">Fleet</div>
  <div class="tab" data-view="dispatch" onclick="showView('dispatch')">Dispatch</div>
  <div class="tab" data-view="jobs" onclick="showView('jobs')">Jobs</div>
  <div class="tab" data-view="leads" onclick="showView('leads')">Leads</div>
</div>

<main>
  <div id="app">
    <div class="unauth">Enter admin token above to load fleet data.</div>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
let tokenEl = $('admin-token');
const urlToken = new URLSearchParams(location.search).get('t');
let token = urlToken || localStorage.getItem('fleet_token') || '';
if (urlToken) localStorage.setItem('fleet_token', urlToken);
tokenEl.value = token;
tokenEl.addEventListener('change', () => { token = tokenEl.value.trim(); localStorage.setItem('fleet_token', token); loadCurrent(); });

let currentView = 'fleet';
let INDUSTRIES = [];
let CITIES = [];
let selectedIndustry = null;
let pickedCities = [];

async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'x-admin-token': token, ...(opts.headers || {}) }
  });
  if (res.status === 401) throw new Error('unauthorized');
  return res.json();
}

function fmt(ts) {
  if (!ts) return '—';
  const s = Math.floor((Date.now() / 1000) - ts);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return new Date(ts * 1000).toLocaleString();
}
function bar(pct) {
  const p = Math.max(0, Math.min(100, pct || 0));
  return `<span class="bar"><span class="bar-fill" style="width:${p}%"></span></span> <span class="muted">${p.toFixed(0)}%</span>`;
}
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function aiBadge(score) {
  if (score == null || score === '') return '<span class="muted">—</span>';
  const s = +score;
  let bg = 'rgba(255,68,85,.2)', fg = '#ff8295';
  if (s >= 70)      { bg = 'rgba(62,255,154,.18)'; fg = '#7dffb6'; }
  else if (s >= 40) { bg = 'rgba(255,179,71,.18)'; fg = '#ffd17a'; }
  return `<span style="display:inline-block;min-width:28px;padding:1px 6px;border-radius:3px;background:${bg};color:${fg};font-weight:700;font-size:11px;text-align:center">${s}</span>`;
}

function showView(v) {
  currentView = v;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === v));
  loadCurrent();
}

async function loadCurrent() {
  if (!token) { $('app').innerHTML = '<div class="unauth">Enter admin token above to load fleet data.</div>'; return; }
  try {
    if (currentView === 'fleet') await renderFleet();
    else if (currentView === 'dispatch') await renderDispatch();
    else if (currentView === 'jobs') await renderJobs();
    else if (currentView === 'leads') await renderLeads();
  } catch (e) {
    $('app').innerHTML = `<div class="unauth">Error: ${e.message}. Check token.</div>`;
  }
}

// ============== FLEET VIEW ==============
async function renderFleet() {
  const [stats, nodes] = await Promise.all([api('/api/admin/stats'), api('/api/admin/nodes')]);
  $('app').innerHTML = `
    <div class="stats">
      <div class="stat"><div class="label">Nodes Online</div><div class="value">${(stats.nodes.working||0)+(stats.nodes.idle||0)+(stats.nodes.paused||0)} <span class="muted" style="font-size:12px">/ ${stats.nodes.total||0}</span></div></div>
      <div class="stat"><div class="label">Working</div><div class="value">${stats.nodes.working||0}</div></div>
      <div class="stat"><div class="label">Queued</div><div class="value">${stats.jobs.queued||0}</div></div>
      <div class="stat"><div class="label">Running</div><div class="value">${stats.jobs.running||0}</div></div>
      <div class="stat"><div class="label">Leads 24h</div><div class="value">${(stats.leads_24h||0).toLocaleString()}</div></div>
      <div class="stat"><div class="label">Leads Total</div><div class="value">${(stats.leads_total||0).toLocaleString()}</div></div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <h2>Nodes (${nodes.nodes.length})</h2>
        <div>
          <button class="amber" onclick="broadcast('pause')">Pause All</button>
          <button class="green" onclick="broadcast('resume')">Resume All</button>
          <button class="danger" onclick="broadcast('kill')">Kill All</button>
        </div>
      </div>
      <div class="panel-body" style="padding:0;overflow-x:auto;">
        <table>
          <thead><tr><th>Label</th><th>Status</th><th>CPU</th><th>RAM</th><th>Caps</th><th>Job</th><th>Leads</th><th>Last Seen</th><th></th></tr></thead>
          <tbody>
            ${nodes.nodes.map(n => `
              <tr>
                <td>
                  <span class="dot ${n.status==='offline'?'offline':n.status==='working'?'working':'online'}"></span>
                  ${esc(n.label || n.hostname || n.machine_id.slice(0,8))}
                  <div class="muted" style="font-size:10px;margin-top:2px">${esc(n.hostname||'')} · v${esc(n.app_version||'?')}</div>
                </td>
                <td><span class="status ${n.status}">${n.status}</span></td>
                <td>${bar(n.cpu_pct)}</td>
                <td>${bar(n.ram_pct)}</td>
                <td class="muted" style="font-size:10px">CPU ${n.cpu_cap}%<br>RAM ${n.ram_cap}%</td>
                <td>${n.current_job_id ? '#'+n.current_job_id : '<span class="muted">—</span>'}</td>
                <td>${(n.leads_harvested||0).toLocaleString()}<br><span class="muted" style="font-size:10px">${n.jobs_done||0} jobs</span></td>
                <td class="muted">${fmt(n.last_seen)}</td>
                <td style="white-space:nowrap">
                  <button onclick="openNodeLogs(${n.id}, '${esc(n.label||n.hostname||'#'+n.id)}')">Logs</button>
                  <button onclick="editNode(${n.id}, '${esc(n.label||'')}', ${n.cpu_cap}, ${n.ram_cap})">Edit</button>
                  ${n.status==='paused'
                    ? `<button onclick="nodeAction(${n.id},'resume')">Resume</button>`
                    : `<button onclick="nodeAction(${n.id},'pause')">Pause</button>`}
                  <button class="danger" onclick="nodeAction(${n.id},'kill')">Kill</button>
                </td>
              </tr>
            `).join('') || '<tr><td colspan="9" class="muted" style="text-align:center;padding:24px">No nodes yet. Enable Fleet Mode in a licensed desktop.</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

async function broadcast(action) {
  if (!confirm(`${action.toUpperCase()} all nodes?`)) return;
  const r = await api(`/api/admin/broadcast/${action}`, { method: 'POST' });
  alert(`${action} sent to ${r.affected} node(s).`);
  loadCurrent();
}
async function nodeAction(id, action) {
  if (action === 'kill' && !confirm(`Kill worker on node #${id}?`)) return;
  await api(`/api/admin/nodes/${id}/${action}`, { method: 'POST' });
  loadCurrent();
}
// ==== Node logs modal ====
let logModalNodeId = null, logModalSince = 0, logModalTimer = null, logModalLabel = '';
async function openNodeLogs(nodeId, label) {
  logModalNodeId = nodeId; logModalSince = 0; logModalLabel = label;
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.id = 'log-modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2>LIVE LOGS // ${esc(label)}</h2>
        <div>
          <button onclick="clearLogView()">Clear</button>
          <button onclick="closeNodeLogs()">Close</button>
        </div>
      </div>
      <div class="modal-body" id="log-modal-body">
        <div style="color:var(--muted)">Fetching logs…</div>
      </div>
    </div>
  `;
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeNodeLogs(); });
  document.body.appendChild(backdrop);
  await pollNodeLogs();
  logModalTimer = setInterval(pollNodeLogs, 2000);
}
function clearLogView() {
  const body = document.getElementById('log-modal-body');
  if (body) body.innerHTML = '';
}
async function pollNodeLogs() {
  if (!logModalNodeId) return;
  try {
    const r = await api(`/api/admin/nodes/${logModalNodeId}/logs?since=${logModalSince}&limit=200`);
    const body = document.getElementById('log-modal-body');
    if (!body) return;
    if (logModalSince === 0 && !r.logs.length) {
      body.innerHTML = '<div style="color:var(--muted)">No logs yet for this node. If Fleet Mode is enabled, worker output will appear here within ~5s.</div>';
      return;
    }
    if (!r.logs.length) return;
    logModalSince = Math.max(...r.logs.map(l => l.id));
    const wasAtBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 40;
    for (const l of r.logs) {
      const d = document.createElement('div');
      d.className = 'log-line ' + (l.level || 'info');
      const ts = new Date(l.t * 1000).toLocaleTimeString();
      d.innerHTML = `<span class="ts">${ts}</span>${l.job_id ? `<span class="job">[job#${l.job_id}]</span>` : ''}${esc(l.msg)}`;
      body.appendChild(d);
    }
    if (wasAtBottom) body.scrollTop = body.scrollHeight;
  } catch (e) { console.error(e); }
}
function closeNodeLogs() {
  if (logModalTimer) clearInterval(logModalTimer);
  logModalTimer = null; logModalNodeId = null; logModalSince = 0;
  const b = document.getElementById('log-modal-backdrop');
  if (b) b.remove();
}

async function editNode(id, label, cpuCap, ramCap) {
  const newLabel = prompt('Label:', label);
  if (newLabel === null) return;
  const cpu = prompt('CPU cap %:', cpuCap);
  if (cpu === null) return;
  const ram = prompt('RAM cap %:', ramCap);
  if (ram === null) return;
  await api(`/api/admin/nodes/${id}`, { method: 'PATCH', body: JSON.stringify({ label: newLabel, cpu_cap: +cpu, ram_cap: +ram }) });
  loadCurrent();
}

// ============== DISPATCH VIEW ==============
async function renderDispatch() {
  await ensureMeta();
  const nodes = await api('/api/admin/nodes');
  const idleNodes = nodes.nodes.filter(n => n.status !== 'offline');

  $('app').innerHTML = `
    <div class="grid-2">
      <div class="panel">
        <div class="panel-header"><h2>Dispatch Scrape Job</h2></div>
        <div class="panel-body">
          <label>Industry (searchable · ${INDUSTRIES.length.toLocaleString()} GMB categories)</label>
          <div class="picker" id="industry-picker">
            <input id="d-industry" placeholder="Type to search…" autocomplete="off">
            <div class="picker-dropdown" id="industry-dropdown" hidden></div>
          </div>

          <label>Max Results Per City</label>
          <input id="d-max" type="number" value="20" min="5" max="500">

          <label>Cities (one per line — "City, ST" or just "City")</label>
          <textarea id="d-cities" rows="8" placeholder="Miami, FL&#10;Austin, TX&#10;Denver, CO"></textarea>

          <div class="small">City presets (all 29,738 US cities loaded):</div>
          <div class="preset-row">
            <button onclick="loadPreset(25)">Top 25</button>
            <button onclick="loadPreset(50)">Top 50</button>
            <button onclick="loadPreset(100)">Top 100</button>
            <button onclick="loadPreset(250)">Top 250</button>
            <button onclick="loadPreset(500)">Top 500</button>
            <button onclick="loadPreset(1000)">Top 1000</button>
            <button class="green" onclick="loadPreset(0)">ALL ${CITIES.length.toLocaleString()}</button>
          </div>

          <label>Filter by State</label>
          <select id="d-state-filter" onchange="filterCitiesByState(this.value)">
            <option value="">— select state —</option>
          </select>

          <label>Target Node (or any idle)</label>
          <select id="d-node">
            <option value="">Any idle node</option>
            ${idleNodes.map(n => `<option value="${n.id}">${esc(n.label||n.hostname||'#'+n.id)} (${n.status})</option>`).join('')}
          </select>

          <label>Priority</label>
          <input id="d-priority" type="number" value="0">

          <button class="primary" style="width:100%;margin-top:14px;padding:10px" onclick="dispatch()">Dispatch to Fleet</button>
          <div class="small" id="d-summary"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header"><h2>Fleet Status</h2></div>
        <div class="panel-body">
          <div class="muted" style="font-size:11px">Nodes online: <b style="color:var(--text)">${idleNodes.length}</b></div>
          <div class="muted" style="font-size:11px;margin-top:4px">Currently working: <b style="color:var(--cyan)">${idleNodes.filter(n=>n.status==='working').length}</b></div>
          <div class="muted" style="font-size:11px;margin-top:4px">Available: <b style="color:var(--green)">${idleNodes.filter(n=>n.status==='idle').length}</b></div>
          <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
            <div class="muted" style="font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Tips</div>
            <div style="font-size:11px;color:var(--muted);line-height:1.6">
              • Each queued city → one job. Jobs are pulled by the first idle worker.<br>
              • Workers self-throttle to their configured CPU/RAM cap.<br>
              • Preset "Top N" uses the largest US cities.<br>
              • Leave Target Node blank to let the fleet load-balance.
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
  initIndustryPicker();
  initStateFilter();
}

async function ensureMeta() {
  if (!INDUSTRIES.length) {
    INDUSTRIES = await (await fetch('/api/meta/industries')).json();
  }
  if (!CITIES.length) {
    CITIES = await (await fetch('/api/meta/cities')).json();
  }
}

function initIndustryPicker() {
  const input = $('d-industry');
  const dropdown = $('industry-dropdown');
  let active = -1, matches = [];
  function score(ind, q) {
    const n = ind.name.toLowerCase();
    if (n === q) return 100;
    if (n.startsWith(q)) return 80;
    if (n.includes(q)) return 40;
    if (ind.gcid.includes(q.replace(/ /g,'_'))) return 30;
    return 0;
  }
  function show(q) {
    q = (q || '').trim().toLowerCase();
    if (!q) {
      // Empty query → scrollable alphabetical list of ALL industries
      matches = [...INDUSTRIES].sort((a, b) => a.name.localeCompare(b.name));
      dropdown.innerHTML = matches.map((m, idx) => `
        <div class="picker-item ${idx===active?'active':''}" onclick="pickIndustry('${esc(m.name)}','${esc(m.gcid)}')">
          ${esc(m.name)}
          <span class="gcid">${esc(m.gcid)}</span>
        </div>
      `).join('');
      dropdown.style.maxHeight = '320px';
      dropdown.style.overflowY = 'auto';
      dropdown.hidden = false;
      return;
    }
    matches = INDUSTRIES.map(i => ({i, s: score(i, q)}))
      .filter(x => x.s > 0).sort((a,b)=>b.s-a.s).slice(0,60).map(x=>x.i);
    if (!matches.length) { dropdown.hidden = true; return; }
    dropdown.innerHTML = matches.map((m, idx) => `
      <div class="picker-item ${idx===active?'active':''}" onclick="pickIndustry('${esc(m.name)}','${esc(m.gcid)}')">
        ${esc(m.name).replace(new RegExp(q,'i'), s=>`<mark>${s}</mark>`)}
        <span class="gcid">${esc(m.gcid)}</span>
      </div>
    `).join('');
    dropdown.style.maxHeight = '320px';
    dropdown.style.overflowY = 'auto';
    dropdown.hidden = false;
  }
  input.addEventListener('input', () => { active = -1; show(input.value); });
  input.addEventListener('focus', () => show(input.value));
  input.addEventListener('blur', () => setTimeout(() => dropdown.hidden = true, 200));
  input.addEventListener('keydown', e => {
    if (e.key==='ArrowDown') { active = Math.min(active+1, matches.length-1); show(input.value); e.preventDefault(); }
    else if (e.key==='ArrowUp') { active = Math.max(active-1, 0); show(input.value); e.preventDefault(); }
    else if (e.key==='Enter' && active>=0) { const m = matches[active]; pickIndustry(m.name, m.gcid); e.preventDefault(); }
    else if (e.key==='Escape') { dropdown.hidden = true; }
  });
}
window.pickIndustry = function(name, gcid) {
  $('d-industry').value = name;
  selectedIndustry = { name, gcid };
  $('industry-dropdown').hidden = true;
};

function initStateFilter() {
  const states = [...new Set(CITIES.map(c => c.state))].sort();
  const sel = $('d-state-filter');
  for (const s of states) {
    const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o);
  }
}

window.filterCitiesByState = function(st) {
  if (!st) return;
  const list = CITIES.filter(c => c.state === st).map(c => `${c.city}, ${c.state}`);
  $('d-cities').value = list.join('\n');
  $('d-summary').textContent = `Loaded ${list.length.toLocaleString()} cities in ${st}`;
};

window.loadPreset = function(n) {
  // sort cities by population desc, take top N (or all if n=0)
  const sorted = [...CITIES].sort((a,b) => (b.pop || b.population || 0) - (a.pop || a.population || 0));
  const picked = n === 0 ? sorted : sorted.slice(0, n);
  $('d-cities').value = picked.map(c => `${c.city}, ${c.state}`).join('\n');
  $('d-summary').textContent = `Loaded ${picked.length.toLocaleString()} cities`;
};

async function dispatch() {
  const industry = selectedIndustry?.name || $('d-industry').value.trim();
  const cities = $('d-cities').value.split('\n').map(s => s.trim()).filter(Boolean);
  const max_results = +$('d-max').value || 20;
  const target_node_id = $('d-node').value ? +$('d-node').value : null;
  const priority = +$('d-priority').value || 0;
  if (!industry || !cities.length) return alert('Industry + at least one city required');
  if (cities.length > 100 && !confirm(`Dispatch ${cities.length} jobs to fleet?`)) return;
  const r = await api('/api/admin/dispatch', {
    method: 'POST',
    body: JSON.stringify({ industry, cities, target_node_id, priority, max_results })
  });
  alert(`Dispatched ${r.dispatched} job(s).`);
  showView('jobs');
}

// ---------- CSV import (same column names as export) ----------
function parseCSV(text) {
  // Simple RFC-4180-ish parser: handles quoted fields + escaped quotes ""
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i++; } else { inQ = false; }
      } else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && text[i+1] === '\n') i++;
        row.push(field); field = '';
        if (row.length && row.some(v => v !== '')) rows.push(row);
        row = [];
      } else field += c;
    }
  }
  if (field || row.length) { row.push(field); if (row.some(v => v !== '')) rows.push(row); }
  if (!rows.length) return [];
  const headers = rows.shift().map(h => h.trim());
  return rows.map(r => {
    const o = {};
    headers.forEach((h, i) => { o[h] = r[i] ?? ''; });
    return o;
  });
}

async function importLeads(ev) {
  const file = ev.target.files?.[0];
  ev.target.value = '';
  if (!file) return;
  const text = await file.text();
  let leads;
  try {
    if (file.name.toLowerCase().endsWith('.json')) {
      const parsed = JSON.parse(text);
      leads = Array.isArray(parsed) ? parsed : (parsed.leads || []);
    } else {
      leads = parseCSV(text);
    }
  } catch (e) { alert('Parse failed: ' + e.message); return; }
  if (!leads.length) { alert('No rows found in file'); return; }
  if (!confirm(`Import ${leads.length} leads into fleet master DB?`)) return;
  try {
    const r = await fetch('/api/admin/leads/import', {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'x-admin-token': token },
      body: JSON.stringify({ leads })
    });
    const d = await r.json();
    if (!r.ok) { alert('Import failed: ' + (d.error || r.status)); return; }
    alert(`Imported ${d.inserted} new (${d.skipped} dup) from ${d.total} rows`);
    loadCurrent();
  } catch (e) { alert('Import failed: ' + e.message); }
}

  window.exportLeads = async function() {
    const qs = new URLSearchParams();

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `fleet-leads-${Date.now()}.csv`; a.click();
      URL.revokeObjectURL(url);
    } catch (e) { alert('Export failed: ' + e.message); }
  };
})();
