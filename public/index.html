<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadRipper Fleet</title>
<style>
  :root {
    --bg: #0a0e14;
    --panel: #111821;
    --panel-2: #0f141c;
    --border: #1e2a38;
    --cyan: #00e5ff;
    --cyan-dim: #00b8cc;
    --text: #e6edf3;
    --muted: #7a8796;
    --green: #3ddc84;
    --amber: #ffb020;
    --red: #ff5c5c;
    --purple: #a78bfa;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: ui-monospace, 'JetBrains Mono', Menlo, monospace;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
  }
  header {
    padding: 12px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, #0e141c, #0a0e14);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { margin: 0; font-size: 16px; letter-spacing: 2px; color: var(--cyan); }
  header h1 span { color: var(--muted); font-weight: normal; }
  .token-input {
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text); padding: 6px 10px;
    font-family: inherit; font-size: 12px; border-radius: 4px; width: 280px;
  }
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); padding: 0 22px; background: var(--panel-2); }
  .tab {
    padding: 10px 18px; cursor: pointer; font-size: 11px; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase; border-bottom: 2px solid transparent;
  }
  .tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab:hover { color: var(--text); }

  main { padding: 22px; max-width: 1600px; margin: 0 auto; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; }
  .stat .label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .stat .value { font-size: 20px; color: var(--cyan); margin-top: 4px; font-weight: 600; }

  .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; align-items: start; }
  @media (max-width: 1100px) { .grid-2 { grid-template-columns: 1fr; } }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 20px; }
  .panel-header {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-header h2 { margin: 0; font-size: 12px; letter-spacing: 2px; color: var(--cyan); text-transform: uppercase; }
  .panel-body { padding: 14px; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { padding: 7px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: normal; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
  tr:hover td { background: rgba(0, 229, 255, 0.03); }

  .status {
    display: inline-block; padding: 2px 8px; border-radius: 3px;
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
  }
  .status.idle, .status.queued { background: rgba(122, 135, 150, 0.12); color: var(--muted); }
  .status.working, .status.running { background: rgba(0, 229, 255, 0.12); color: var(--cyan); }
  .status.offline { background: rgba(122, 135, 150, 0.12); color: var(--muted); }
  .status.paused { background: rgba(255, 176, 32, 0.12); color: var(--amber); }
  .status.done { background: rgba(61, 220, 132, 0.12); color: var(--green); }
  .status.failed { background: rgba(255, 92, 92, 0.12); color: var(--red); }
  .status.cancelled { background: rgba(122, 135, 150, 0.12); color: var(--muted); }

  button {
    background: transparent; border: 1px solid var(--border); color: var(--text);
    padding: 5px 10px; border-radius: 3px; cursor: pointer;
    font-family: inherit; font-size: 11px; transition: all 0.15s;
  }
  button:hover { border-color: var(--cyan); color: var(--cyan); }
  button.primary { background: var(--cyan); color: var(--bg); border-color: var(--cyan); }
  button.primary:hover { background: var(--cyan-dim); border-color: var(--cyan-dim); }
  button.danger { color: var(--red); border-color: rgba(255,92,92,0.3); }
  button.danger:hover { border-color: var(--red); }
  button.amber { color: var(--amber); border-color: rgba(255,176,32,0.3); }
  button.amber:hover { border-color: var(--amber); }
  button.green { color: var(--green); border-color: rgba(61,220,132,0.3); }
  button.green:hover { border-color: var(--green); }

  input, select, textarea {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 7px 10px; font-family: inherit; font-size: 12px; border-radius: 4px; width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--cyan); }
  label { display: block; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; margin-top: 10px; }
  label:first-child { margin-top: 0; }

  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot.offline { background: var(--muted); }
  .dot.working { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .bar { width: 60px; height: 4px; background: var(--border); border-radius: 2px; display: inline-block; vertical-align: middle; }
  .bar-fill { height: 100%; background: var(--cyan); border-radius: 2px; }

  .muted { color: var(--muted); }
  .unauth { padding: 40px; text-align: center; color: var(--muted); }

  /* Industry picker */
  .picker { position: relative; }
  .picker-dropdown {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 50;
    background: var(--panel); border: 1px solid var(--cyan); border-top: none;
    max-height: 280px; overflow-y: auto; border-radius: 0 0 4px 4px;
  }
  .picker-dropdown[hidden] { display: none; }
  .picker-item {
    padding: 7px 10px; cursor: pointer; font-size: 12px;
    border-bottom: 1px solid var(--border);
  }
  .picker-item:hover, .picker-item.active { background: rgba(0, 229, 255, 0.08); color: var(--cyan); }
  .picker-item .gcid { color: var(--muted); font-size: 10px; margin-left: 6px; }
  .picker-item mark { background: rgba(0, 229, 255, 0.25); color: var(--cyan); padding: 0; }

  .preset-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .preset-row button { font-size: 10px; padding: 4px 8px; }
  .small { font-size: 10px; color: var(--muted); margin-top: 4px; }

  .lead-row td { font-size: 11px; }
  .copy-icon { cursor: pointer; color: var(--muted); margin-left: 4px; font-size: 10px; }
  .copy-icon:hover { color: var(--cyan); }

  /* Log modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 200; display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--panel); border: 1px solid var(--cyan);
    border-radius: 6px; width: 90%; max-width: 1000px; height: 80vh;
    display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0,229,255,0.2);
  }
  .modal-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-header h2 { margin: 0; font-size: 13px; letter-spacing: 2px; color: var(--cyan); }
  .modal-body {
    flex: 1; overflow-y: auto; padding: 14px 16px;
    font-family: ui-monospace, Menlo, monospace; font-size: 12px; line-height: 1.5;
    background: #060a0f;
  }
  .log-line { padding: 2px 0; white-space: pre-wrap; word-break: break-all; }
  .log-line .ts { color: var(--muted); margin-right: 10px; font-size: 10px; }
  .log-line .job { color: var(--purple); margin-right: 8px; font-size: 10px; }
  .log-line.error { color: var(--red); }
  .log-line.warn { color: var(--amber); }
</style>
</head>
<body>
<header>
  <h1>LEADRIPPER <span>// FLEET CONTROL</span></h1>
  <input type="password" class="token-input" id="admin-token" placeholder="Password" />
</header>

<div class="tabs">
  <div class="tab active" data-view="fleet" onclick="showView('fleet')">Fleet</div>
  <div class="tab" data-view="dispatch" onclick="showView('dispatch')">Dispatch</div>
  <div class="tab" data-view="jobs" onclick="showView('jobs')">Jobs</div>
  <div class="tab" data-view="masscrape" onclick="showView('masscrape')">Mass Scrape</div>
  <div class="tab" data-view="leads" onclick="showView('leads')">Leads</div>
  <div class="tab" data-view="ghl" onclick="showView('ghl')">GHL Sync</div>
  <div class="tab" data-view="ai" onclick="showView('ai')">AI Assistant</div>
  <div class="tab" data-view="import" onclick="showView('import')">Import</div>
  <div class="tab" data-view="downloads" onclick="showView('downloads')">Downloads</div>
</div>

<main>
  <div id="app">
    <div class="unauth">Enter password above to load fleet data.</div>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
let tokenEl = $('admin-token');
const urlToken = new URLSearchParams(location.search).get('t');
let token = urlToken || localStorage.getItem('fleet_token') || '';
if (urlToken) localStorage.setItem('fleet_token', urlToken);
tokenEl.value = token;
tokenEl.addEventListener('change', () => { token = tokenEl.value.trim(); localStorage.setItem('fleet_token', token); loadCurrent(); });

let currentView = 'fleet';
let INDUSTRIES = [];
let CITIES = [];
let selectedIndustry = null;
let pickedCities = [];

async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'x-admin-token': token, ...(opts.headers || {}) }
  });
  if (res.status === 401) throw new Error('unauthorized — enter password in the top-right field');
  if (!res.ok) {
    let msg = `HTTP ${res.status}`;
    try { const j = await res.json(); if (j.error) msg += `: ${j.error}`; } catch {}
    throw new Error(msg);
  }
  return res.json();
}

function fmt(ts) {
  if (!ts) return '—';
  const s = Math.floor((Date.now() / 1000) - ts);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return new Date(ts * 1000).toLocaleString();
}
function bar(pct) {
  const p = Math.max(0, Math.min(100, pct || 0));
  return `<span class="bar"><span class="bar-fill" style="width:${p}%"></span></span> <span class="muted">${p.toFixed(0)}%</span>`;
}
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function aiBadge(score) {
  if (score == null || score === '') return '<span class="muted">—</span>';
  const s = +score;
  let bg = 'rgba(255,68,85,.2)', fg = '#ff8295';
  if (s >= 70)      { bg = 'rgba(62,255,154,.18)'; fg = '#7dffb6'; }
  else if (s >= 40) { bg = 'rgba(255,179,71,.18)'; fg = '#ffd17a'; }
  return `<span style="display:inline-block;min-width:28px;padding:1px 6px;border-radius:3px;background:${bg};color:${fg};font-weight:700;font-size:11px;text-align:center">${s}</span>`;
}
function histoRow(label, count, total) {
  const pct = total ? Math.round((count/total)*100) : 0;
  return `<div style="display:flex;align-items:center;gap:6px;font-size:11px;margin:2px 0">
    <span style="width:36px;color:#ffb347">${label}</span>
    <span style="flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden"><span style="display:block;height:100%;width:${pct}%;background:linear-gradient(90deg,#ffb347,#ff6b6b)"></span></span>
    <span class="muted" style="width:52px;text-align:right">${count||0} (${pct}%)</span>
  </div>`;
}
function toggleLeadDetail(id) {
  const el = document.getElementById('lead-detail-'+id);
  if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
}
function renderLeadDetail(l) {
  const totalReviews = (+l.reviews_1star||0)+(+l.reviews_2star||0)+(+l.reviews_3star||0)+(+l.reviews_4star||0)+(+l.reviews_5star||0);
  const hasHisto = totalReviews > 0;
  const hrs = l.business_hours ? String(l.business_hours).split(/\s*\|\s*|\n/).filter(Boolean) : [];
  return `
    <div style="padding:12px 16px;background:rgba(0,191,160,.04);border-top:1px solid rgba(0,191,160,.15);border-bottom:1px solid rgba(0,191,160,.15);display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;font-size:11px">
      <div>
        <div style="color:#00bfa0;font-weight:700;margin-bottom:6px">REVIEW HISTOGRAM</div>
        ${hasHisto ? [5,4,3,2,1].map(s => histoRow(s+'★', +l['reviews_'+s+'star']||0, totalReviews)).join('') : '<span class="muted">No histogram scraped yet</span>'}
        <div class="muted" style="margin-top:4px">Total: ${l.reviews||totalReviews||0} reviews${l.rating?` · avg ${l.rating}★`:''}</div>
      </div>
      <div>
        <div style="color:#00bfa0;font-weight:700;margin-bottom:6px">BUSINESS HOURS</div>
        ${hrs.length ? hrs.map(h => `<div style="margin:2px 0">${esc(h)}</div>`).join('') : '<span class="muted">Not scraped</span>'}
        ${l.address ? `<div style="margin-top:8px;color:#00bfa0;font-weight:700">ADDRESS</div><div>${esc(l.address)}</div>` : ''}
      </div>
      <div>
        <div style="color:#00bfa0;font-weight:700;margin-bottom:6px">AI ANALYSIS</div>
        ${(l.ai_seo_score!=null || l.ai_design_score!=null) ? `
          <div style="margin:2px 0">SEO: ${aiBadge(l.ai_seo_score)} ${l.ai_seo_notes?`<span class="muted">${esc(l.ai_seo_notes)}</span>`:''}</div>
          <div style="margin:2px 0">Design: ${aiBadge(l.ai_design_score)} ${l.ai_design_notes?`<span class="muted">${esc(l.ai_design_notes)}</span>`:''}</div>
          ${l.ai_provider?`<div class="muted" style="margin-top:4px">via ${esc(l.ai_provider)}${l.ai_analyzed_at?` · ${fmt(l.ai_analyzed_at)}`:''}</div>`:''}
        ` : '<span class="muted">Not analyzed</span>'}
      </div>
    </div>`;
}

function showView(v) {
  currentView = v;
  if (v !== 'ghl' && typeof stopGhlPoll === 'function') stopGhlPoll();
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === v));
  loadCurrent();
}

async function loadCurrent() {
  if (!token && currentView !== 'downloads') { $('app').innerHTML = '<div class="unauth">Enter password above to load fleet data.</div>'; return; }
  try {
    if (currentView === 'fleet') await renderFleet();
    else if (currentView === 'dispatch') await renderDispatch();
    else if (currentView === 'jobs') await renderJobs();
    else if (currentView === 'massscrape') await renderMassScrape();
    else if (currentView === 'leads') await renderLeads();
    else if (currentView === 'ghl') await renderGhl();
    else if (currentView === 'ai') await renderAi();
    else if (currentView === 'import') await renderImport();
    else if (currentView === 'downloads') await renderDownloads();
  } catch (e) {
    $('app').innerHTML = `<div class="unauth">Error: ${e.message}. Check password.</div>`;
  }
}

// ============== FLEET VIEW ==============
async function renderFleet() {
  const [stats, nodes, activity] = await Promise.all([api('/api/admin/stats'), api('/api/admin/nodes'), api('/api/admin/activity?window=180').catch(()=>({activity:[]}))]);
  $('app').innerHTML = `
    <div class="stats">
      <div class="stat"><div class="label">Nodes Online</div><div class="value">${(stats.nodes.working||0)+(stats.nodes.idle||0)+(stats.nodes.paused||0)} <span class="muted" style="font-size:12px">/ ${stats.nodes.total||0}</span></div></div>
      <div class="stat"><div class="label">Working</div><div class="value">${stats.nodes.working||0}</div></div>
      <div class="stat"><div class="label">Queued</div><div class="value">${stats.jobs.queued||0}</div></div>
      <div class="stat"><div class="label">Running</div><div class="value">${stats.jobs.running||0}</div></div>
      <div class="stat"><div class="label">Leads 24h</div><div class="value">${(stats.leads_24h||0).toLocaleString()}</div></div>
      <div class="stat"><div class="label">Leads Total</div><div class="value">${(stats.leads_total||0).toLocaleString()}</div></div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <h2>Nodes (${nodes.nodes.length})</h2>
        <div>
          <button class="amber" onclick="broadcast('pause')">Pause All</button>
          <button class="green" onclick="broadcast('resume')">Resume All</button>
          <button class="danger" onclick="broadcast('kill')">Kill All</button>
        </div>
      </div>
      <div class="panel-body" style="padding:0;overflow-x:auto;">
        <table>
          <thead><tr><th>Label</th><th>Status</th><th>CPU</th><th>RAM</th><th>Caps</th><th>Active Job</th><th>Leads</th><th>Last Seen</th><th></th></tr></thead>
          <tbody>
            ${nodes.nodes.map(n => `
              <tr>
                <td>
                  <span class="dot ${n.status==='offline'?'offline':n.status==='working'?'working':'online'}"></span>
                  ${esc(n.label || n.hostname || n.machine_id.slice(0,8))}
                  <div class="muted" style="font-size:10px;margin-top:2px">${esc(n.hostname||'')} · v${esc(n.app_version||'?')}</div>
                </td>
                <td><span class="status ${n.status}">${n.status}</span></td>
                <td>${bar(n.cpu_pct)}</td>
                <td>${bar(n.ram_pct)}</td>
                <td class="muted" style="font-size:10px">CPU ${n.cpu_cap}%<br>RAM ${n.ram_cap}%</td>
                <td>${n.current_job_id || n.current_job_industry
                  ? `<div>${n.current_job_id?`#${n.current_job_id} `:''}<span style="color:#00bfa0">${esc(n.current_job_industry||'—')}</span></div>
                     <div class="muted" style="font-size:10px">${esc(n.current_job_city||'')} · <strong style="color:#7dffb6">${n.current_job_leads||0}</strong> leads</div>`
                  : '<span class="muted">idle</span>'}</td>
                <td>${(n.leads_harvested||0).toLocaleString()}<br><span class="muted" style="font-size:10px">${n.jobs_done||0} jobs</span></td>
                <td class="muted">${fmt(n.last_seen)}</td>
                <td style="white-space:nowrap">
                  <button onclick="openNodeLogs(${n.id}, '${esc(n.label||n.hostname||'#'+n.id)}')">Logs</button>
                  <button onclick="editNode(${n.id}, '${esc(n.label||'')}', ${n.cpu_cap}, ${n.ram_cap})">Edit</button>
                  ${n.status==='paused'
                    ? `<button onclick="nodeAction(${n.id},'resume')">Resume</button>`
                    : `<button onclick="nodeAction(${n.id},'pause')">Pause</button>`}
                  <button class="danger" onclick="nodeAction(${n.id},'kill')">Kill</button>
                </td>
              </tr>
            `).join('') || '<tr><td colspan="9" class="muted" style="text-align:center;padding:24px">No nodes yet. Enable Fleet Mode in a licensed desktop.</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>
    <div class="panel" style="margin-top:16px">
      <div class="panel-header">
        <h2>Live Local Activity <span class="muted" style="font-size:12px;font-weight:normal">— scrapes running inside the LeadRipper app (not fleet-dispatched)</span></h2>
        <span class="muted" style="font-size:11px">last 3 min</span>
      </div>
      <div class="panel-body" style="padding:0;overflow-x:auto;">
        <table>
          <thead><tr><th>Node</th><th>Industry</th><th>Cities</th><th>Leads (3m)</th><th>Started</th><th>Last Lead</th></tr></thead>
          <tbody>
            ${activity.activity.map(a => {
              const ago = Math.max(0, Math.floor((Date.now()/1000) - a.last_at));
              const isHot = ago < 30;
              return `<tr${isHot ? ' style="background:rgba(0,191,160,.06)"' : ''}>
                <td>
                  <span class="dot ${isHot?'working':'online'}"></span>
                  ${esc(a.node_label || a.node_hostname || '#'+a.node_id)}
                </td>
                <td><span class="status done">${esc(a.industry||'—')}</span></td>
                <td>${a.cities_count}</td>
                <td><strong>${a.leads_count}</strong></td>
                <td class="muted" style="font-size:10px">${fmt(a.first_at)}</td>
                <td class="muted" style="font-size:10px">${ago}s ago</td>
              </tr>`;
            }).join('') || '<tr><td colspan="6" class="muted" style="text-align:center;padding:24px">No local activity in the last 3 minutes.</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

async function broadcast(action) {
  if (!confirm(`${action.toUpperCase()} all nodes?`)) return;
  const r = await api(`/api/admin/broadcast/${action}`, { method: 'POST' });
  alert(`${action} sent to ${r.affected} node(s).`);
  loadCurrent();
}
async function nodeAction(id, action) {
  if (action === 'kill' && !confirm(`Kill worker on node #${id}?`)) return;
  await api(`/api/admin/nodes/${id}/${action}`, { method: 'POST' });
  loadCurrent();
}
// ==== Node logs modal ====
let logModalNodeId = null, logModalSince = 0, logModalTimer = null, logModalLabel = '';
async function openNodeLogs(nodeId, label) {
  logModalNodeId = nodeId; logModalSince = 0; logModalLabel = label;
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.id = 'log-modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2>LIVE LOGS // ${esc(label)}</h2>
        <div>
          <button onclick="clearLogView()">Clear</button>
          <button onclick="closeNodeLogs()">Close</button>
        </div>
      </div>
      <div class="modal-body" id="log-modal-body">
        <div style="color:var(--muted)">Fetching logs…</div>
      </div>
    </div>
  `;
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeNodeLogs(); });
  document.body.appendChild(backdrop);
  await pollNodeLogs();
  logModalTimer = setInterval(pollNodeLogs, 2000);
}
function clearLogView() {
  const body = document.getElementById('log-modal-body');
  if (body) body.innerHTML = '';
}
async function pollNodeLogs() {
  if (!logModalNodeId) return;
  try {
    const r = await api(`/api/admin/nodes/${logModalNodeId}/logs?since=${logModalSince}&limit=200`);
    const body = document.getElementById('log-modal-body');
    if (!body) return;
    if (logModalSince === 0 && !r.logs.length) {
      body.innerHTML = '<div style="color:var(--muted)">No logs yet for this node. If Fleet Mode is enabled, worker output will appear here within ~5s.</div>';
      return;
    }
    if (!r.logs.length) return;
    logModalSince = Math.max(...r.logs.map(l => l.id));
    const wasAtBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 40;
    for (const l of r.logs) {
      const d = document.createElement('div');
      d.className = 'log-line ' + (l.level || 'info');
      const ts = new Date(l.t * 1000).toLocaleTimeString();
      d.innerHTML = `<span class="ts">${ts}</span>${l.job_id ? `<span class="job">[job#${l.job_id}]</span>` : ''}${esc(l.msg)}`;
      body.appendChild(d);
    }
    if (wasAtBottom) body.scrollTop = body.scrollHeight;
  } catch (e) { console.error(e); }
}
function closeNodeLogs() {
  if (logModalTimer) clearInterval(logModalTimer);
  logModalTimer = null; logModalNodeId = null; logModalSince = 0;
  const b = document.getElementById('log-modal-backdrop');
  if (b) b.remove();
}

function initIndustryPicker() {
  const input = $('d-industry');
  const dropdown = $('industry-dropdown');
  let active = -1, matches = [];
  function score(ind, q) {
    const n = ind.name.toLowerCase();
    if (n === q) return 100;
    if (n.startsWith(q)) return 80;
    if (n.includes(q)) return 40;
    if (ind.gcid.includes(q.replace(/ /g,'_'))) return 30;
    return 0;
  }
  function show(q) {
    q = (q || '').trim().toLowerCase();
    if (!q) {
      // Empty query → scrollable alphabetical list of ALL industries
      matches = [...INDUSTRIES].sort((a, b) => a.name.localeCompare(b.name));
      dropdown.innerHTML = matches.map((m, idx) => `
        <div class="picker-item ${idx===active?'active':''}" onclick="pickIndustry('${esc(m.name)}','${esc(m.gcid)}')">
          ${esc(m.name)}
          <span class="gcid">${esc(m.gcid)}</span>
        </div>
      `).join('');
      dropdown.style.maxHeight = '320px';
      dropdown.style.overflowY = 'auto';
      dropdown.hidden = false;
      return;
    }
    matches = INDUSTRIES.map(i => ({i, s: score(i, q)}))
      .filter(x => x.s > 0).sort((a,b)=>b.s-a.s).slice(0,60).map(x=>x.i);
    if (!matches.length) { dropdown.hidden = true; return; }
    dropdown.innerHTML = matches.map((m, idx) => `
      <div class="picker-item ${idx===active?'active':''}" onclick="pickIndustry('${esc(m.name)}','${esc(m.gcid)}')">
        ${esc(m.name).replace(new RegExp(q,'i'), s=>`<mark>${s}</mark>`)}
        <span class="gcid">${esc(m.gcid)}</span>
      </div>
    `).join('');
    dropdown.style.maxHeight = '320px';
    dropdown.style.overflowY = 'auto';
    dropdown.hidden = false;
  }
  input.addEventListener('input', () => { active = -1; show(input.value); });
  input.addEventListener('focus', () => show(input.value));
  input.addEventListener('blur', () => setTimeout(() => dropdown.hidden = true, 200));
  input.addEventListener('keydown', e => {
    if (e.key==='ArrowDown') { active = Math.min(active+1, matches.length-1); show(input.value); e.preventDefault(); }
    else if (e.key==='ArrowUp') { active = Math.max(active-1, 0); show(input.value); e.preventDefault(); }
    else if (e.key==='Enter' && active>=0) { const m = matches[active]; pickIndustry(m.name, m.gcid); e.preventDefault(); }
    else if (e.key==='Escape') { dropdown.hidden = true; }
  });
}
window.pickIndustry = function(name, gcid) {
  $('d-industry').value = name;
  selectedIndustry = { name, gcid };
  $('industry-dropdown').hidden = true;
};

function initStateFilter() {
  const states = [...new Set(CITIES.map(c => c.state))].sort();

}

window.filterCitiesByState = function(st) {
  if (!st) return;
  const list = CITIES.filter(c => c.state === st).map(c => `${c.city}, ${c.state}`);
  $('d-cities').value = list.join('\n');
  $('d-summary').textContent = `Loaded ${list.length.toLocaleString()} cities in ${st}`;
};

window.loadPreset = function(n) {
  // sort cities by population desc, take top N (or all if n=0)
  const sorted = [...CITIES].sort((a,b) => (b.pop || b.population || 0) - (a.pop || a.population || 0));
  const picked = n === 0 ? sorted : sorted.slice(0, n);
  $('d-cities').value = picked.map(c => `${c.city}, ${c.state}`).join('\n');
  $('d-summary').textContent = `Loaded ${picked.length.toLocaleString()} cities`;
};

async function dispatch() {
  if (!token) return alert('Enter password in the top-right field first.');
  const industry = selectedIndustry?.name || $('d-industry').value.trim();
  const cities = $('d-cities').value.split('\n').map(s => s.trim()).filter(Boolean);
  const max_results = +$('d-max').value || 20;
  const target_node_id = $('d-node').value ? +$('d-node').value : null;
  const priority = +$('d-priority').value || 0;
  if (!industry || !cities.length) return alert('Industry + at least one city required');
  if (cities.length > 100 && !confirm(`Dispatch ${cities.length} jobs to fleet?`)) return;
  const nodesInfo = await api('/api/admin/stats').catch(() => null);
  const onlineNodes = nodesInfo ? (nodesInfo.nodes.idle + nodesInfo.nodes.working + nodesInfo.nodes.paused) : 0;
  if (onlineNodes === 0 && !confirm('⚠ No nodes are online. Jobs will queue but nothing will run until a worker comes online. Continue?')) return;
  try {
    const r = await api('/api/admin/dispatch', {
      method: 'POST',
      body: JSON.stringify({ industry, cities, target_node_id, priority, max_results })
    });
    alert(`✓ Dispatched ${r.dispatched} job(s).${onlineNodes===0?' Queued — waiting for a worker to come online.':''}`);
    showView('jobs');
  } catch (e) {
    alert('Dispatch failed: ' + e.message);
  }
}

// ---------- CSV import (same column names as export) ----------
function parseCSV(text) {
  // Simple RFC-4180-ish parser: handles quoted fields + escaped quotes ""
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i++; } else { inQ = false; }
      } else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && text[i+1] === '\n') i++;
        row.push(field); field = '';
        if (row.length && row.some(v => v !== '')) rows.push(row);
        row = [];
      } else field += c;
    }
  }
  if (field || row.length) { row.push(field); if (row.some(v => v !== '')) rows.push(row); }
  if (!rows.length) return [];
  const headers = rows.shift().map(h => h.trim());
  return rows.map(r => {
    const o = {};
    headers.forEach((h, i) => { o[h] = r[i] ?? ''; });
    return o;
  });
}

async function importLeads(ev) {
  const file = ev.target.files?.[0];
  ev.target.value = '';
  if (!file) return;
  const text = await file.text();
  let leads;
  try {
    if (file.name.toLowerCase().endsWith('.json')) {
      const parsed = JSON.parse(text);
      leads = Array.isArray(parsed) ? parsed : (parsed.leads || []);
    } else {
      leads = parseCSV(text);
    }
  } catch (e) { alert('Parse failed: ' + e.message); return; }
  if (!leads.length) { alert('No rows found in file'); return; }
  if (!confirm(`Import ${leads.length} leads into fleet master DB?`)) return;
  try {
    const r = await fetch('/api/admin/leads/import', {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'x-admin-token': token },
      body: JSON.stringify({ leads })
    });
    const d = await r.json();
    if (!r.ok) { alert('Import failed: ' + (d.error || r.status)); return; }
    alert(`Imported ${d.inserted} new (${d.skipped} dup) from ${d.total} rows`);
    loadCurrent();
  } catch (e) { alert('Import failed: ' + e.message); }
}

    const r = await api('/api/admin/ghl/sync', { method: 'POST', body: JSON.stringify({ filter, onlyUnsynced: false, trigger: 'filter-all' }), headers: {'Content-Type':'application/json'} });
    if (r.error) { alert(r.error); return; }
    if (!r.total) { alert('No leads match that filter.'); return; }
    renderGhl();
  } catch (e) { alert('Start failed: ' + e.message); }
}
async function cancelGhlSync() {
  await api('/api/admin/ghl/cancel', { method: 'POST' });
  renderGhl();
}

// ============== AI ASSISTANT VIEW ==============
// History kept in a module-scope var so navigating away and back preserves the chat.
let aiHistory = [];     // Anthropic-style messages (role + content blocks)
let aiBusy = false;

async function renderAi() {
  $('app').innerHTML = `
    <div style="display:flex;flex-direction:column;height:calc(100vh - 120px);padding:0 20px 16px">
      <div style="display:flex;align-items:center;gap:10px;padding:12px 0">
        <h2 style="margin:0">AI Assistant</h2>
        <span class="muted" style="font-size:12px">Tools: list/count leads · sync GHL · control mass-scrape · fleet stats</span>
        <div style="flex:1"></div>
        <button onclick="aiClear()">New chat</button>
      </div>
      <div id="ai-thread" style="flex:1;overflow-y:auto;background:#0a0d14;border:1px solid var(--border);border-radius:8px;padding:14px;font-size:13px;line-height:1.5"></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <textarea id="ai-input" rows="3" placeholder="e.g. How many unsynced plumbers in FL?  —or—  Push all unsynced HVAC contractors in TX to GHL"
          style="flex:1;resize:vertical;padding:10px;font-family:inherit;font-size:13px;background:#0a0d14;border:1px solid var(--border);border-radius:6px;color:var(--text)"
          onkeydown="if (event.key==='Enter' && (event.ctrlKey||event.metaKey)) { event.preventDefault(); aiSend(); }"></textarea>
        <div style="display:flex;flex-direction:column;gap:6px">
          <button id="ai-send-btn" class="primary" onclick="aiSend()">Send</button>
          <span class="muted" style="font-size:10px;text-align:center">Ctrl+Enter</span>
        </div>
      </div>
    </div>
  `;
  renderAiThread();
}

function renderAiThread() {
  const host = document.getElementById('ai-thread');
  if (!host) return;
  if (!aiHistory.length && !aiBusy) {
    host.innerHTML = `<div class="muted" style="text-align:center;padding:40px">Ask something. Examples:
<div style="margin-top:14px;font-family:monospace;font-size:12px;text-align:left;max-width:600px;margin-left:auto;margin-right:auto">
• How many unsynced leads with phone numbers do I have?
• Show me the top 10 plumbers in Miami by review count
• Sync all unsynced roofing contractors in Texas to GHL
• Start mass-scrape
• What industries have the most unsynced leads?
</div></div>`;
    return;
  }
  const parts = [];
  for (const m of aiHistory) {
    if (m.role === 'user') {
      const text = typeof m.content === 'string' ? m.content
                  : (m.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
      const tools = typeof m.content === 'string' ? [] : (m.content || []).filter(b => b.type === 'tool_result');
      if (text) {
        parts.push(`<div style="margin:10px 0"><div style="color:#7dffb6;font-weight:600;margin-bottom:4px">You</div><div style="white-space:pre-wrap">${esc(text)}</div></div>`);
      }
      for (const tr of tools) {
        const shown = String(tr.content || '').slice(0, 800);
        parts.push(`<details style="margin:6px 0 6px 18px;font-family:monospace;font-size:11px;color:#9fb3c8"><summary style="cursor:pointer">↳ tool result</summary><pre style="white-space:pre-wrap;margin:4px 0">${esc(shown)}</pre></details>`);
      }
    } else if (m.role === 'assistant') {
      const blocks = Array.isArray(m.content) ? m.content : [{type:'text', text: String(m.content||'')}];
      for (const b of blocks) {
        if (b.type === 'text') {
          parts.push(`<div style="margin:10px 0"><div style="color:#a9d8ff;font-weight:600;margin-bottom:4px">Claude</div><div style="white-space:pre-wrap">${esc(b.text || '')}</div></div>`);
        } else if (b.type === 'tool_use') {
          const input = JSON.stringify(b.input || {}, null, 2);
          parts.push(`<details style="margin:6px 0 6px 18px;font-family:monospace;font-size:11px;color:#ffb347"><summary style="cursor:pointer">→ calling <code>${esc(b.name)}</code></summary><pre style="white-space:pre-wrap;margin:4px 0">${esc(input)}</pre></details>`);
        }
      }
    }
  }
  if (aiBusy) parts.push('<div class="muted" style="padding:10px">thinking…</div>');
  host.innerHTML = parts.join('');
  host.scrollTop = host.scrollHeight;
}

async function aiSend() {
  if (aiBusy) return;
  const input = document.getElementById('ai-input');
  const text = (input.value || '').trim();
  if (!text) return;
  input.value = '';
  aiBusy = true;
  const btn = document.getElementById('ai-send-btn');
  if (btn) btn.disabled = true;
  // Optimistically add the user message
  aiHistory.push({ role: 'user', content: [{ type: 'text', text }] });
  renderAiThread();
  try {
    const r = await api('/api/admin/ai/chat', {
      method: 'POST',
      body: JSON.stringify({ history: aiHistory.slice(0, -1), userMessage: text }),
      headers: { 'Content-Type': 'application/json' },
    });
    if (r.error) throw new Error(r.error);
    // Server returns the appended messages (user + assistant turns + tool rounds)
    // Replace our optimistic last-user entry with the authoritative list
    aiHistory = aiHistory.slice(0, -1).concat(r.messages || []);
  } catch (e) {
    aiHistory.push({ role: 'assistant', content: [{ type: 'text', text: '⚠️ ' + e.message }] });
  } finally {
    aiBusy = false;
    if (btn) btn.disabled = false;
    renderAiThread();
  }
}

function aiClear() {
  aiHistory = [];
  renderAiThread();
}

let importData = { headers: [], rows: [], mapping: {}, filename: '' };
async function renderImport() {
  $('app').innerHTML = `
    <div class="panel">

      <div class="panel-body">

          we auto-detect common aliases (<code>business_name → name</code>, <code>stars → rating</code>, etc.)

        </p>

function renderImportMapping() {
  const previewRows = importData.rows.slice(0, 5);
  return `
    <hr style="border:none;border-top:1px solid var(--border);margin:20px 0" />
    <h3 style="margin:0 0 10px">Column Mapping</h3>
    <p class="muted" style="margin:0 0 10px">Map each column in your file to a master-DB column. Set to <code>— ignore —</code> to skip.</p>

      ${importData.headers.map((h,i) => {
        const samples = previewRows.map(r => r[h]).filter(v => v != null && v !== '').slice(0,3).map(esc).join(' · ');
        const opts = ['<option value="">— ignore —</option>']
          .concat(IMPORT_TARGETS.map(t => `<option value="${t}" ${importData.mapping[h]===t?'selected':''}>${t}</option>`))
          .join('');
        return `
          <div><code>${esc(h)}</code></div>
          <div><select onchange="importData.mapping[${JSON.stringify(h)}]=this.value" style="width:100%">${opts}</select></div>
          <div class="muted" style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${samples || '—'}</div>
        `;
      }).join('')}
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="primary" onclick="runImport()" style="padding:10px 20px">Import ${importData.rows.length.toLocaleString()} leads</button>
      <button onclick="importData={headers:[],rows:[],mapping:{},filename:''};loadCurrent()">Reset</button>
      <span class="muted" id="imp-result"></span>
    </div>
  `;
}
async function onImportFile(ev) {
  const file = ev.target.files?.[0];
  ev.target.value = '';
  if (!file) return;
  const text = await file.text();
  let rows;
  try {
    if (file.name.toLowerCase().endsWith('.json')) {
      const p = JSON.parse(text);
      rows = Array.isArray(p) ? p : (p.leads || []);
    } else {
      rows = parseCSV(text);
    }
  } catch (e) { alert('Parse failed: ' + e.message); return; }
  if (!rows.length) { alert('No rows found'); return; }
  const headers = Object.keys(rows[0]);
  const mapping = {};
  headers.forEach(h => { mapping[h] = autoMapHeader(h); });
  importData = { headers, rows, mapping, filename: file.name };
  loadCurrent();
}
async function runImport() {
  // Apply mapping: rename keys from source → target
  const leads = importData.rows.map(src => {
    const out = {};
    for (const [from, to] of Object.entries(importData.mapping)) {
      if (!to) continue;
      if (src[from] != null && src[from] !== '') out[to] = src[from];
    }
    return out;
  }).filter(l => l.name || l.phone || l.website); // need at least one identifier
  if (!leads.length) { alert('After mapping, no rows have a name/phone/website. Check your column mapping.'); return; }
  $('imp-result').textContent = `Uploading ${leads.length.toLocaleString()}...`;
  try {
    // Chunk large imports so we don't blow request size limits
    const CHUNK = 2000;
    let inserted = 0, skipped = 0, total = 0;
    for (let i = 0; i < leads.length; i += CHUNK) {
      const chunk = leads.slice(i, i + CHUNK);
      const r = await fetch('/api/admin/leads/import', {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-admin-token': token },
        body: JSON.stringify({ leads: chunk })
      });
      if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error || 'HTTP ' + r.status); }
      const d = await r.json();
      inserted += d.inserted; skipped += d.skipped; total += d.total;
      $('imp-result').textContent = `${Math.min(i+CHUNK, leads.length).toLocaleString()} / ${leads.length.toLocaleString()} · ${inserted.toLocaleString()} new, ${skipped.toLocaleString()} dup`;
    }
    alert(`✓ Imported ${inserted.toLocaleString()} new leads (${skipped.toLocaleString()} duplicates skipped) from ${total.toLocaleString()} rows.`);
    importData = { headers: [], rows: [], mapping: {}, filename: '' };
    loadCurrent();
  } catch (e) { alert('Import failed: ' + e.message); $('imp-result').textContent = 'Failed.'; }
}

function fmtBytes(b) {
  if (b == null) return '—';
  const units = ['B','KB','MB','GB'];
  let i = 0, size = +b;
  while (size >= 1024 && i < units.length - 1) { size /= 1024; i++; }
  return `${size.toFixed(2)} ${units[i]}`;
}
