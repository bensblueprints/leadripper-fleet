<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadRipper Fleet</title>
<style>
  :root {
    --bg: #0a0e14;
    --panel: #111821;
    --panel-2: #0f141c;
    --border: #1e2a38;
    --cyan: #00e5ff;
    --cyan-dim: #00b8cc;
    --text: #e6edf3;
    --muted: #7a8796;
    --green: #3ddc84;
    --amber: #ffb020;
    --red: #ff5c5c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: ui-monospace, 'JetBrains Mono', Menlo, monospace;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
  }
  header {
    padding: 14px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, #0e141c, #0a0e14);
  }
  header h1 {
    margin: 0;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--cyan);
  }
  header h1 span { color: var(--muted); font-weight: normal; }
  .token-input {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    font-family: inherit;
    font-size: 12px;
    border-radius: 4px;
    width: 280px;
  }
  main { padding: 22px; max-width: 1400px; margin: 0 auto; }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 22px;
  }
  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
  }
  .stat .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .stat .value { font-size: 22px; color: var(--cyan); margin-top: 6px; font-weight: 600; }
  .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 22px; }
  @media (max-width: 1000px) { .grid-2 { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 22px;
  }
  .panel-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-header h2 {
    margin: 0;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--cyan);
    text-transform: uppercase;
  }
  .panel-body { padding: 16px; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td {
    padding: 8px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  th { color: var(--muted); font-weight: normal; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
  tr:hover td { background: rgba(0, 229, 255, 0.03); }

  .status {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .status.idle { background: rgba(61, 220, 132, 0.12); color: var(--green); }
  .status.working { background: rgba(0, 229, 255, 0.12); color: var(--cyan); }
  .status.offline { background: rgba(122, 135, 150, 0.12); color: var(--muted); }
  .status.paused { background: rgba(255, 176, 32, 0.12); color: var(--amber); }
  .status.queued { background: rgba(122, 135, 150, 0.12); color: var(--muted); }
  .status.running { background: rgba(0, 229, 255, 0.12); color: var(--cyan); }
  .status.done { background: rgba(61, 220, 132, 0.12); color: var(--green); }
  .status.failed { background: rgba(255, 92, 92, 0.12); color: var(--red); }
  .status.cancelled { background: rgba(122, 135, 150, 0.12); color: var(--muted); }

  button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    transition: all 0.15s;
  }
  button:hover { border-color: var(--cyan); color: var(--cyan); }
  button.primary { background: var(--cyan); color: var(--bg); border-color: var(--cyan); }
  button.primary:hover { background: var(--cyan-dim); border-color: var(--cyan-dim); }
  button.danger { color: var(--red); border-color: rgba(255,92,92,0.3); }
  button.danger:hover { border-color: var(--red); }

  input, select, textarea {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    font-family: inherit;
    font-size: 12px;
    border-radius: 4px;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--cyan); }
  label { display: block; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .form-row { margin-bottom: 12px; }

  .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot.offline { background: var(--muted); }
  .dot.working { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .bar { width: 60px; height: 4px; background: var(--border); border-radius: 2px; display: inline-block; vertical-align: middle; }
  .bar-fill { height: 100%; background: var(--cyan); border-radius: 2px; }

  .muted { color: var(--muted); }
  .unauth { padding: 40px; text-align: center; color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>LEADRIPPER <span>// FLEET CONTROL</span></h1>
  <input type="password" class="token-input" id="admin-token" placeholder="Admin token" />
</header>

<main>
  <div id="app">
    <div class="unauth">Enter admin token above to load fleet data.</div>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
let tokenEl = $('admin-token');
// token precedence: ?t=... query param > localStorage
const urlToken = new URLSearchParams(location.search).get('t');
let token = urlToken || localStorage.getItem('fleet_token') || '';
if (urlToken) localStorage.setItem('fleet_token', urlToken);
tokenEl.value = token;

tokenEl.addEventListener('change', () => {
  token = tokenEl.value.trim();
  localStorage.setItem('fleet_token', token);
  loadAll();
});

async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'x-admin-token': token,
      ...(opts.headers || {})
    }
  });
  if (res.status === 401) throw new Error('unauthorized');
  return res.json();
}

function fmt(ts) {
  if (!ts) return '—';
  const d = new Date(ts * 1000);
  const s = Math.floor((Date.now() / 1000) - ts);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return d.toLocaleString();
}

function bar(pct) {
  const p = Math.max(0, Math.min(100, pct || 0));
  return `<span class="bar"><span class="bar-fill" style="width:${p}%"></span></span> <span class="muted">${p.toFixed(0)}%</span>`;
}

async function loadAll() {
  if (!token) {
    $('app').innerHTML = '<div class="unauth">Enter admin token above to load fleet data.</div>';
    return;
  }
  try {
    const [stats, nodes, jobs] = await Promise.all([
      api('/api/admin/stats'),
      api('/api/admin/nodes'),
      api('/api/admin/jobs?limit=50')
    ]);
    render(stats, nodes.nodes, jobs.jobs);
  } catch (e) {
    $('app').innerHTML = `<div class="unauth">Error: ${e.message}. Check token.</div>`;
  }
}

function render(stats, nodes, jobs) {
  $('app').innerHTML = `
    <div class="stats">
      <div class="stat"><div class="label">Nodes Online</div><div class="value">${(stats.nodes.working||0)+(stats.nodes.idle||0)+(stats.nodes.paused||0)} <span class="muted" style="font-size:14px">/ ${stats.nodes.total||0}</span></div></div>
      <div class="stat"><div class="label">Working</div><div class="value">${stats.nodes.working||0}</div></div>
      <div class="stat"><div class="label">Queued Jobs</div><div class="value">${stats.jobs.queued||0}</div></div>
      <div class="stat"><div class="label">Running</div><div class="value">${stats.jobs.running||0}</div></div>
      <div class="stat"><div class="label">Leads (24h)</div><div class="value">${(stats.leads_24h||0).toLocaleString()}</div></div>
      <div class="stat"><div class="label">Leads Total</div><div class="value">${(stats.leads_total||0).toLocaleString()}</div></div>
    </div>

    <div class="grid-2">
      <div>
        <div class="panel">
          <div class="panel-header"><h2>Nodes (${nodes.length})</h2><button onclick="loadAll()">Refresh</button></div>
          <div class="panel-body" style="padding:0;overflow-x:auto;">
            <table>
              <thead><tr>
                <th>Label</th><th>Status</th><th>CPU</th><th>RAM</th><th>Job</th><th>Leads</th><th>Last Seen</th><th></th>
              </tr></thead>
              <tbody>
                ${nodes.map(n => `
                  <tr>
                    <td>
                      <span class="dot ${n.status==='offline'?'offline':n.status==='working'?'working':'online'}"></span>
                      ${n.label || n.hostname || n.machine_id.slice(0,8)}
                      <div class="muted" style="font-size:10px;margin-top:2px">${n.hostname||''} · v${n.app_version||'?'}</div>
                    </td>
                    <td><span class="status ${n.status}">${n.status}</span></td>
                    <td>${bar(n.cpu_pct)}<br><span class="muted" style="font-size:10px">cap ${n.cpu_cap}%</span></td>
                    <td>${bar(n.ram_pct)}<br><span class="muted" style="font-size:10px">cap ${n.ram_cap}%</span></td>
                    <td>${n.current_job_id ? '#'+n.current_job_id : '<span class="muted">—</span>'}</td>
                    <td>${(n.leads_harvested||0).toLocaleString()}<br><span class="muted" style="font-size:10px">${n.jobs_done||0} jobs</span></td>
                    <td class="muted">${fmt(n.last_seen)}</td>
                    <td style="white-space:nowrap">
                      ${n.status==='paused'
                        ? `<button onclick="nodeAction(${n.id},'resume')">Resume</button>`
                        : `<button onclick="nodeAction(${n.id},'pause')">Pause</button>`}
                      <button class="danger" onclick="nodeAction(${n.id},'kill')">Kill</button>
                    </td>
                  </tr>
                `).join('') || '<tr><td colspan="8" class="muted" style="text-align:center;padding:24px">No nodes yet. Fire up a worker.</td></tr>'}
              </tbody>
            </table>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header"><h2>Recent Jobs</h2></div>
          <div class="panel-body" style="padding:0;overflow-x:auto;">
            <table>
              <thead><tr><th>#</th><th>Industry</th><th>City</th><th>Node</th><th>Status</th><th>Leads</th><th>Age</th><th></th></tr></thead>
              <tbody>
                ${jobs.map(j => `
                  <tr>
                    <td>#${j.id}</td>
                    <td>${j.industry}</td>
                    <td>${j.city}${j.state?', '+j.state:''}</td>
                    <td>${j.assigned_node_id ? '#'+j.assigned_node_id : '<span class="muted">—</span>'}</td>
                    <td><span class="status ${j.status}">${j.status}</span></td>
                    <td>${j.leads_found||0}</td>
                    <td class="muted">${fmt(j.created_at)}</td>
                    <td>${(j.status==='queued'||j.status==='running')
                      ? `<button class="danger" onclick="cancelJob(${j.id})">Cancel</button>` : ''}</td>
                  </tr>
                `).join('') || '<tr><td colspan="8" class="muted" style="text-align:center;padding:24px">No jobs dispatched yet.</td></tr>'}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div>
        <div class="panel">
          <div class="panel-header"><h2>Dispatch Job</h2></div>
          <div class="panel-body">
            <div class="form-row">
              <label>Industry (GCID or name)</label>
              <input id="d-industry" placeholder="Plumber" />
            </div>
            <div class="form-row">
              <label>Cities (one per line)</label>
              <textarea id="d-cities" rows="6" placeholder="Miami&#10;Tampa&#10;Orlando"></textarea>
            </div>
            <div class="form-row">
              <label>State (optional)</label>
              <input id="d-state" placeholder="FL" />
            </div>
            <div class="form-row">
              <label>Target node (optional)</label>
              <select id="d-node">
                <option value="">Any idle node</option>
                ${nodes.map(n => `<option value="${n.id}">${n.label||n.hostname||'#'+n.id}</option>`).join('')}
              </select>
            </div>
            <div class="form-row">
              <label>Priority</label>
              <input id="d-priority" type="number" value="0" />
            </div>
            <button class="primary" style="width:100%" onclick="dispatch()">Dispatch</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

async function dispatch() {
  const industry = $('d-industry').value.trim();
  const cities = $('d-cities').value.split('\n').map(s => s.trim()).filter(Boolean);
  const state = $('d-state').value.trim();
  const target_node_id = $('d-node').value ? +$('d-node').value : null;
  const priority = +$('d-priority').value || 0;
  if (!industry || !cities.length) return alert('industry + at least one city required');
  const r = await api('/api/admin/dispatch', {
    method: 'POST',
    body: JSON.stringify({ industry, cities, state, target_node_id, priority })
  });
  alert(`Dispatched ${r.dispatched} job(s).`);
  $('d-cities').value = '';
  loadAll();
}

async function cancelJob(id) {
  if (!confirm(`Cancel job #${id}?`)) return;
  await api(`/api/admin/jobs/${id}/cancel`, { method: 'POST' });
  loadAll();
}

async function nodeAction(id, action) {
  if (action === 'kill' && !confirm(`Kill worker on node #${id}?`)) return;
  await api(`/api/admin/nodes/${id}/${action}`, { method: 'POST' });
  loadAll();
}

loadAll();
setInterval(loadAll, 5000);
</script>
</body>
</html>
